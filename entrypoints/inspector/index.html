<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CVM — Live State Inspector</title>
    <style>
      :root {
        --bg: #1a1a1e;
        --panel: #232329;
        --text: #e8e8ea;
        --muted: #8a8a92;
        --accent: #7c3aed;
        --border: #33333b;
        --ok: #34d399;
        --off: #6b7280;
        --highlight: rgba(124, 58, 237, 0.45);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 760px;
        margin: 0 auto 16px;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }
      .conn {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      .conn .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--off);
        transition: background-color 0.2s ease;
      }
      .conn.online .dot {
        background: var(--ok);
      }
      table {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        font-size: 14px;
      }
      th,
      td {
        padding: 10px 14px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      thead th {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      .col-dot {
        width: 18px;
      }
      .row-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--border);
        transition: background-color 0.2s ease;
      }
      .cell-name {
        font-family: 'Consolas', monospace;
        color: var(--text);
      }
      .cell-value {
        font-family: 'Consolas', monospace;
        color: var(--ok);
        border-radius: 4px;
        transition: background-color 0.9s ease;
      }
      .cell-type,
      .cell-source {
        color: var(--muted);
        font-size: 13px;
      }
      .changed .cell-value {
        background: var(--highlight);
        color: var(--text);
        transition: background-color 0s;
      }
      .changed .row-dot {
        background: var(--accent);
      }

      /* --- Меню кэша текстов (Стадия 2) --- */
      .cache {
        max-width: 760px;
        margin: 28px auto 0;
      }
      .cache-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .cache-head h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }
      .cache-actions {
        display: flex;
        gap: 8px;
      }
      .cache-sort {
        font-family: inherit;
        font-size: 13px;
        color: var(--text);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        transition: border-color 0.15s ease, color 0.15s ease;
      }
      .cache-sort:hover:not(:disabled) {
        border-color: var(--accent);
      }
      .cache-sort:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .cache-clear {
        font-family: inherit;
        font-size: 13px;
        color: var(--text);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        transition: border-color 0.15s ease, color 0.15s ease;
      }
      .cache-clear:hover:not(:disabled) {
        border-color: #dc2626;
        color: #f87171;
      }
      .cache-clear:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .cache-empty {
        color: var(--muted);
        font-size: 14px;
        padding: 16px;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .cache-item {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .ci-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        cursor: pointer;
        user-select: none;
      }
      .ci-head:hover {
        background: rgba(124, 58, 237, 0.08);
      }
      .ci-caret {
        color: var(--muted);
        font-size: 11px;
        transition: transform 0.15s ease;
      }
      .cache-item.open .ci-caret {
        transform: rotate(90deg);
      }
      .ci-title {
        flex: 1;
        font-size: 14px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ci-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 14px;
      }
      .ci-link:hover {
        text-decoration: underline;
      }
      .ci-time {
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .ci-body {
        display: none; /* видимостью управляет класс .open на .cache-item */
        border-top: 1px solid var(--border);
        padding: 12px 14px;
        flex-direction: column;
        gap: 12px;
      }
      .cache-item.open .ci-body {
        display: flex;
      }
      .banner-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 6px;
      }
      .banner-text {
        font-size: 13px;
        line-height: 1.5;
        color: var(--text);
        white-space: pre-wrap;
        max-height: 180px;
        overflow-y: auto;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
      }
      .banner-text.placeholder {
        color: var(--muted);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Live State Inspector</h1>
      <div id="conn" class="conn">
        <span class="dot"></span>
        <span id="conn-label">отключено</span>
      </div>
    </header>

    <table>
      <thead>
        <tr>
          <th class="col-dot"></th>
          <th>Переменная</th>
          <th>Значение</th>
          <th>Тип</th>
          <th>Источник</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <section class="cache">
      <div class="cache-head">
        <h2>Кэш текстов</h2>
        <div class="cache-actions">
          <button id="cache-sort" class="cache-sort" type="button">↓ Сначала новые</button>
          <button id="cache-clear" class="cache-clear" type="button">Очистить кэш</button>
        </div>
      </div>
      <div id="cache-list"></div>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
