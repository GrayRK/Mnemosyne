<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mnemosyne</title>
    <style>
      /* Токены --m-* инжектятся из lib/theme.ts (buildThemeCss(':root')) в main.ts. */
      * {
        box-sizing: border-box;
      }
      body {
        width: 340px;
        margin: 0;
        padding: 14px;
        font-family: var(--m-font-ui);
        font-size: 13px;
        color: var(--m-text);
        background: var(--m-bg);
      }

      /* --- Шапка с локапом --- */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--m-space-3);
      }
      .lockup {
        height: 22px;
        width: auto;
        display: block;
      }
      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 26px;
        font-family: 'Consolas', 'Cascadia Mono', monospace;
        font-size: 13px;
        color: var(--m-text-muted);
        background: var(--m-surface-2);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-sm);
        padding: 4px 9px;
        cursor: pointer;
      }
      .icon-btn:hover {
        color: var(--m-text);
        border-color: var(--m-accent);
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      /* Меню выбора языка интерфейса (кнопка-иконка + выпадающий список). */
      .lang-menu {
        position: relative;
      }
      .lang-dropdown {
        position: absolute;
        right: 0;
        top: calc(100% + 4px);
        z-index: 10;
        min-width: 132px;
        padding: 4px;
        background: var(--m-surface-2);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-sm);
        box-shadow: var(--m-shadow-pop);
      }
      .lang-dropdown[hidden] {
        display: none;
      }
      .lang-option {
        display: block;
        width: 100%;
        text-align: left;
        padding: 6px 8px;
        font-family: inherit;
        font-size: 13px;
        color: var(--m-text);
        background: transparent;
        border: none;
        border-radius: var(--m-radius-sm);
        cursor: pointer;
      }
      .lang-option:hover {
        background: var(--m-surface);
      }
      .lang-option[aria-selected='true'] {
        color: var(--m-on-accent);
        background: var(--m-accent);
      }

      /* --- Вкладки (сегментный переключатель) --- */
      .tabs {
        display: flex;
        gap: 2px;
        padding: 3px;
        margin-bottom: var(--m-space-3);
        background: var(--m-surface-inset);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-pill);
      }
      .tab {
        flex: 1;
        padding: 6px 0;
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        color: var(--m-text-muted);
        background: transparent;
        border: none;
        border-radius: var(--m-radius-pill);
        cursor: pointer;
        transition: color 0.12s, background 0.12s;
      }
      .tab:hover {
        color: var(--m-text);
      }
      .tab[aria-selected='true'] {
        color: var(--m-on-accent);
        background: var(--m-accent);
      }

      /* --- Панели вкладок --- */
      [data-panel][hidden] {
        display: none;
      }

      /* --- Карточки и секции --- */
      .card {
        padding: var(--m-space-3);
        margin-bottom: var(--m-space-3);
        background: var(--m-surface);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius);
      }
      .card.stub {
        opacity: 0.6;
      }
      .section-label {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: var(--m-space-2);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: var(--m-tracking-label);
        color: var(--m-text-muted);
      }

      /* --- Бейдж «скоро» --- */
      .badge {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: var(--m-radius-pill);
        color: var(--m-brand-2);
        background: var(--m-accent-soft);
      }

      /* --- Поля --- */
      .field {
        margin-bottom: var(--m-space-3);
      }
      .field:last-child {
        margin-bottom: 0;
      }
      .field > label {
        display: block;
        margin-bottom: 5px;
        color: var(--m-text-muted);
      }
      input[type='text'],
      input[type='password'],
      select,
      textarea {
        width: 100%;
        padding: 7px 9px;
        color: var(--m-text);
        background: var(--m-surface-inset);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-sm);
        font-family: inherit;
        font-size: 13px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--m-accent);
        box-shadow: 0 0 0 3px var(--m-accent-soft);
      }
      input:disabled,
      select:disabled,
      textarea:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      textarea {
        resize: none;
        min-height: 64px;
        line-height: 1.4;
      }

      .swap-btn {
        height: 33px;
        padding: 0 9px;
        color: var(--m-text-muted);
        background: var(--m-surface-2);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-sm);
        cursor: not-allowed;
      }

      /* --- Слайдеры --- */
      input[type='range'] {
        width: 100%;
        accent-color: var(--m-accent);
        cursor: pointer;
      }
      .slider-value {
        color: var(--m-text);
        font-variant-numeric: tabular-nums;
      }

      /* --- Строки с тогглом --- */
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .row + .row {
        margin-top: var(--m-space-3);
      }
      .row > label {
        color: var(--m-text);
      }

      /* --- Тоггл-пилюля --- */
      input[type='checkbox'] {
        appearance: none;
        -webkit-appearance: none;
        flex: none;
        width: 38px;
        height: 22px;
        margin: 0;
        position: relative;
        background: var(--m-surface-2);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-pill);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      input[type='checkbox']::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--m-text-faint);
        transition: transform 0.15s, background 0.15s;
      }
      input[type='checkbox']:checked {
        background: var(--m-accent);
        border-color: var(--m-accent);
      }
      input[type='checkbox']:checked::after {
        background: var(--m-on-accent);
        transform: translateX(16px);
      }
      input[type='checkbox']:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .hint {
        margin-top: 6px;
        font-size: 11px;
        color: var(--m-text-faint);
        line-height: 1.4;
      }

      /* Карточка текущего видео */
      .video-preview {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }
      .video-thumb {
        flex: none;
        width: 96px;
        height: 54px;
        object-fit: cover;
        border-radius: var(--m-radius-sm);
        background: var(--m-surface-inset);
        border: 1px solid var(--m-border);
      }
      .video-info {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .video-title {
        color: var(--m-text);
        font-weight: 600;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .video-lang {
        font-size: 12px;
        color: var(--m-text-muted);
      }
      .video-cache {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-top: 2px;
      }
      .cache-line {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--m-text-muted);
      }
      .cache-dot {
        flex: none;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--m-ok);
      }
      .video-actions {
        display: flex;
        gap: 8px;
        margin-top: var(--m-space-3);
      }
      .btn-secondary {
        flex: 1;
        padding: 7px 10px;
        font-family: inherit;
        font-size: 12px;
        color: var(--m-text);
        background: var(--m-surface-2);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-sm);
        cursor: pointer;
      }
      .btn-secondary:hover:not(:disabled) {
        border-color: var(--m-accent);
      }
      .btn-secondary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .video-confirm {
        margin-top: var(--m-space-3);
        padding: 10px;
        background: var(--m-surface-inset);
        border: 1px solid var(--m-border);
        border-radius: var(--m-radius-sm);
      }
      .video-confirm-q {
        font-size: 12px;
        line-height: 1.4;
        color: var(--m-text);
        margin-bottom: 8px;
      }
      .video-confirm-actions {
        display: flex;
        gap: 8px;
      }
      .btn-danger {
        flex: 1;
        padding: 7px 10px;
        font-family: inherit;
        font-size: 12px;
        color: var(--m-on-accent);
        background: var(--m-danger);
        border: 1px solid var(--m-danger);
        border-radius: var(--m-radius-sm);
        cursor: pointer;
      }
      .btn-danger:hover {
        background: var(--m-danger-hover);
        border-color: var(--m-danger-hover);
      }
    </style>
  </head>
  <body>
    <header>
      <img class="lockup" src="/brand/logo-lockup.svg" alt="Mnemosyne" />
      <div class="header-actions">
        <button id="open-history" class="icon-btn" type="button">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 3v5h5" />
            <path d="M3.05 13a9 9 0 1 0 2.13-5.36L3 8" />
            <path d="M12 7v5l3 2" />
          </svg>
        </button>
        <div class="lang-menu">
          <button id="lang-button" class="icon-btn" aria-haspopup="true" aria-expanded="false">
            RU
          </button>
          <div id="lang-dropdown" class="lang-dropdown" hidden></div>
        </div>
      </div>
    </header>

    <div class="tabs" role="tablist">
      <button class="tab" role="tab" data-tab="main" aria-selected="true" data-i18n="tabMain">
        Главная
      </button>
      <button class="tab" role="tab" data-tab="translate" aria-selected="false" data-i18n="tabTranslate">
        Перевод
      </button>
      <button class="tab" role="tab" data-tab="voice" aria-selected="false" data-i18n="tabVoice">
        Озвучка
      </button>
    </div>

    <!-- ======================= ВКЛАДКА: ГЛАВНАЯ ======================= -->
    <section data-panel="main">
      <!-- Текущее видео: превью, название, язык оригинала, переводы в кэше, действия.
           Карточка целиком скрывается, если активная вкладка — не видео YouTube. -->
      <div class="card" id="video-card" hidden>
        <div class="section-label" data-i18n="videoCurrent">Текущее видео</div>
        <div class="video-preview">
          <img id="video-thumb" class="video-thumb" alt="" />
          <div class="video-info">
            <div id="video-title" class="video-title"></div>
            <div class="video-lang">
              <span data-i18n="videoOrigLang">Язык оригинала:</span>
              <span id="video-lang">—</span>
            </div>
            <div id="video-cache" class="video-cache" hidden></div>
          </div>
        </div>
        <div class="video-actions">
          <button id="video-delete-cache" class="btn-secondary" disabled data-i18n="videoDeleteCache">
            Удалить кэш видео
          </button>
          <button id="video-details" class="btn-secondary" disabled data-i18n="videoDetails">
            Подробнее
          </button>
        </div>
        <!-- Встроенное подтверждение удаления (window.confirm закрывает popup). -->
        <div id="video-delete-confirm" class="video-confirm" hidden>
          <div id="video-delete-confirm-q" class="video-confirm-q"></div>
          <div class="video-confirm-actions">
            <button id="video-delete-confirm-no" class="btn-secondary" type="button"></button>
            <button id="video-delete-confirm-yes" class="btn-danger" type="button"></button>
          </div>
        </div>
      </div>

      <!-- Язык перевода (язык оригинала определяется из видео автоматически) -->
      <div class="card">
        <div class="section-label" data-i18n="langTarget">Язык перевода</div>
        <div class="field" style="margin: 0">
          <select id="language"></select>
        </div>
      </div>

      <!-- Громкость -->
      <div class="card">
        <div class="section-label" data-i18n="volumeSection">Громкость</div>
        <div class="field">
          <div class="row">
            <label for="tts-volume" data-i18n="volumeTts">Громкость озвучки</label>
            <span id="tts-volume-value" class="slider-value">90%</span>
          </div>
          <input id="tts-volume" type="range" min="0" max="100" step="1" />
        </div>
        <div class="field">
          <div class="row">
            <label for="video-volume" data-i18n="volumeVideo">Громкость видео</label>
            <span id="video-volume-value" class="slider-value">60%</span>
          </div>
          <input id="video-volume" type="range" min="20" max="100" step="1" />
        </div>
      </div>

      <!-- Основные тогглы -->
      <div class="card">
        <div class="section-label" data-i18n="sectionMain">Основные</div>
        <div class="row">
          <label for="tts-enabled" data-i18n="toggleVoice">Озвучивать видео</label>
          <input id="tts-enabled" type="checkbox" />
        </div>
        <div class="row">
          <label for="subtitles-enabled" data-i18n="toggleSubs">Показывать субтитры</label>
          <input id="subtitles-enabled" type="checkbox" />
        </div>
        <div class="row">
          <label for="auto-start" data-i18n="toggleAutostart">Запускать автоматически</label>
          <input id="auto-start" type="checkbox" />
        </div>
      </div>

      <!-- Субтитры -->
      <div class="card">
        <div class="section-label" data-i18n="sectionSubs">Субтитры</div>
        <div class="field">
          <div class="row">
            <label for="subs-bg-transparency" data-i18n="subsTransparency">Прозрачность подложки</label>
            <span id="subs-bg-transparency-value" class="slider-value">42%</span>
          </div>
          <input id="subs-bg-transparency" type="range" />
        </div>
        <div class="field">
          <div class="row">
            <label for="subs-size" data-i18n="subsSize">Размер</label>
            <span id="subs-size-value" class="slider-value">100%</span>
          </div>
          <input id="subs-size" type="range" />
        </div>
        <div class="field">
          <div class="row">
            <label for="subs-position" data-i18n="subsPosition">Смещение по вертикали</label>
            <span id="subs-position-value" class="slider-value">0%</span>
          </div>
          <input id="subs-position" type="range" />
        </div>
        <div class="row">
          <label for="subs-neighbors" data-i18n="subsKaraoke">Режим караоке</label>
          <input id="subs-neighbors" type="checkbox" />
        </div>
        <div class="row">
          <label for="subs-rate" data-i18n="subsShowRate">Показывать скорость озвучки</label>
          <input id="subs-rate" type="checkbox" />
        </div>
        <div class="row">
          <label for="subs-who">
            <span data-i18n="subsWhoSpeaks">Кто говорит</span>
            <span class="badge" data-i18n="badgeSoon">скоро</span>
          </label>
          <input id="subs-who" type="checkbox" disabled />
        </div>
        <div class="field" style="margin-top: var(--m-space-3); margin-bottom: 0">
          <label for="subs-font" data-i18n="subsFont">Шрифт</label>
          <select id="subs-font"></select>
        </div>
      </div>
    </section>

    <!-- ======================= ВКЛАДКА: ПЕРЕВОД ======================= -->
    <section data-panel="translate" hidden>
      <div class="card">
        <div class="section-label" data-i18n="trMethod">Метод перевода</div>
        <div class="field" style="margin: 0">
          <select id="translation-method"></select>
          <div class="hint" id="translation-method-hint"></div>
        </div>
      </div>

      <!-- Карточки ниже видны в зависимости от возможностей выбранного метода (data-cap). -->
      <div class="card" data-cap="apiKey">
        <div class="section-label" data-i18n="trAccess">Доступ</div>
        <div class="field" style="margin: 0">
          <label for="api-key" data-i18n="trApiKey">API ключ</label>
          <input id="api-key" type="password" autocomplete="off" placeholder="sk-..." />
        </div>
      </div>

      <div class="card stub" data-cap="model">
        <div class="section-label">
          <span data-i18n="trModel">Модель</span>
          <span class="badge" data-i18n="badgeSoon">скоро</span>
        </div>
        <div class="field">
          <select disabled>
            <option>Claude Sonnet 4.6</option>
          </select>
        </div>
        <div class="row">
          <label data-i18n="trSignInLabel">Вход (Sign In) на сервис</label>
          <button class="swap-btn" disabled>Sign In</button>
        </div>
      </div>

      <div class="card stub" data-cap="prompt">
        <div class="section-label">
          <span data-i18n="trFineTune">Тонкая настройка</span>
          <span class="badge" data-i18n="badgeSoon">скоро</span>
        </div>
        <div class="field">
          <label data-i18n="trBatching">Батчинг — количество батчей</label>
          <input id="tr-batching" type="text" disabled />
        </div>
        <div class="field" style="margin: 0">
          <label data-i18n="trPrompt">Системный промпт перевода</label>
          <textarea id="tr-prompt" disabled></textarea>
        </div>
      </div>
    </section>

    <!-- ======================= ВКЛАДКА: ОЗВУЧКА ======================= -->
    <section data-panel="voice" hidden>
      <div class="card">
        <div class="section-label" data-i18n="vcMethod">Метод озвучки</div>
        <div class="field">
          <label for="tts-engine" data-i18n="vcEngine">Движок</label>
          <select id="tts-engine"></select>
        </div>
        <div class="field" style="margin: 0">
          <label for="voice" data-i18n="vcVoice">Голос</label>
          <select id="voice"></select>
        </div>
      </div>

      <div class="card stub">
        <div class="section-label">
          <span data-i18n="vcMultivoice">Многоголосье</span>
          <span class="badge" data-i18n="badgeSoon">скоро</span>
        </div>
        <div class="row">
          <label data-i18n="vcMultivoice">Многоголосье</label>
          <input type="checkbox" disabled />
        </div>
        <div class="row">
          <label data-i18n="vcCloning">Клонирование голоса</label>
          <input type="checkbox" disabled />
        </div>
      </div>

      <div class="card stub">
        <div class="section-label">
          <span data-i18n="vcTempoEmotions">Темп и эмоции</span>
          <span class="badge" data-i18n="badgeSoon">скоро</span>
        </div>
        <div class="field">
          <label data-i18n="vcMinSpeed">Минимальная скорость</label>
          <input type="range" min="0" max="100" value="20" disabled />
        </div>
        <div class="field">
          <label data-i18n="vcMaxSpeed">Максимальная скорость</label>
          <input type="range" min="0" max="100" value="80" disabled />
        </div>
        <div class="hint" data-i18n="vcTempoHint">Диапазон темпа сейчас автоматический; ручная настройка появится позже.</div>
        <div class="field" style="margin-top: var(--m-space-3); margin-bottom: 0">
          <label data-i18n="vcEmotions">Эмоции (преувеличение, экспрессия)</label>
          <input type="range" min="0" max="100" value="50" disabled />
        </div>
      </div>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
