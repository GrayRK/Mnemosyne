<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mnemosyne — бренд-знак (источник для favicon-PNG, см. scripts/render-icons.mjs).
  Монограмма «M» в холодном бренд-градиенте (серебро→лаванда→барвинок→фиолет)
  + мотив созвездия из лого V2 «Constellation», на индиго-плитке.
  Монограмма, а не портрет: уверенно читается в 16/32px.
-->
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="20" y1="16" x2="108" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9D2EC"/>
      <stop offset="0.35" stop-color="#BCB1EF"/>
      <stop offset="0.65" stop-color="#88AEF1"/>
      <stop offset="1" stop-color="#7256E7"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1F2C"/>
      <stop offset="1" stop-color="#0E1118"/>
    </linearGradient>
  </defs>

  <!-- Индиго-плитка -->
  <rect x="2" y="2" width="124" height="124" rx="28" fill="url(#tile)"/>
  <rect x="2.5" y="2.5" width="123" height="123" rx="27.5" stroke="#262B36" stroke-width="1"/>

  <!-- Созвездие: тонкая дуга-орбита и звёзды -->
  <circle cx="64" cy="64" r="50" stroke="url(#brand)" stroke-width="1" opacity="0.25"/>
  <g fill="url(#brand)">
    <circle cx="20" cy="50" r="1.8" opacity="0.8"/>
    <circle cx="40" cy="22" r="1.4" opacity="0.6"/>
    <circle cx="92" cy="24" r="1.6" opacity="0.7"/>
    <circle cx="108" cy="74" r="1.8" opacity="0.8"/>
    <circle cx="86" cy="104" r="1.3" opacity="0.55"/>
  </g>
  <!-- Бликующая звезда (4 луча) у вершины монограммы -->
  <path d="M64 14 L66 24 L64 28 L62 24 Z M54 21 L64 23 L74 21 L64 25 Z"
        fill="url(#brand)" opacity="0.9"/>

  <!-- Монограмма M -->
  <path d="M38 90 L38 40 L64 70 L90 40 L90 90"
        stroke="url(#brand)" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
